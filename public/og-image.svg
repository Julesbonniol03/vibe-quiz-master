<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2d7b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2d7b"/>
    </linearGradient>
    <radialGradient id="orb1" cx="15%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(0,240,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="70%" r="35%">
      <stop offset="0%" stop-color="rgba(255,45,123,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(80)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(160)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(240)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(960)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1040)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1120)"/>
  </g>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="30" fill="none" stroke="url(#cyan)" stroke-width="2" opacity="0.3"/>

  <!-- Logo -->
  <rect x="520" y="120" width="160" height="160" rx="40" fill="url(#cyan)" filter="url(#glow)"/>
  <text x="600" y="225" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="100" fill="white">V</text>

  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="52" fill="url(#textGrad)">Vibe Quiz Master</text>

  <!-- Subtitle -->
  <text x="600" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="24" fill="#94a3b8">L'élite de la Culture G en mode Cyber-Luxe</text>

  <!-- Stats -->
  <text x="600" y="465" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="18" fill="#475569">🧠 1000+ Questions · ⚡ 17 Catégories · 🔥 3 Modes de Jeu</text>

  <!-- CTA -->
  <rect x="440" y="500" width="320" height="55" rx="16" fill="url(#cyan)" opacity="0.15"/>
  <rect x="440" y="500" width="320" height="55" rx="16" fill="none" stroke="url(#cyan)" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="535" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="18" fill="#00f0ff">Jouer maintenant →</text>
</svg>
